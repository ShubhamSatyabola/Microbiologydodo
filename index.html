  --surface2: #22263a;
  --text: #e8e8f0;
  --muted: #9ca3af;
  --border: #2d3148;

/* ── RESET & BASE ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  line-height: 1.6;
}

/* ── STICKY HEADER ──────────────────────────────────────────── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
  box-shadow: 0 2px 20px rgba(0,0,0,0.35);
  padding: 0 24px;
  height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.header-left { display: flex; flex-direction: column; }
.site-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.45rem; font-weight: 700;
  color: #fff; letter-spacing: 0.02em; line-height: 1.1;
}
.site-sub { font-size: 0.72rem; color: #a5b4fc; font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; }
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.78rem; font-weight: 600;
  border: none; border-radius: 8px; cursor: pointer;
  padding: 6px 12px; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn-theme {
  background: rgba(255,255,255,0.15);
  color: #fff; border: 1px solid rgba(255,255,255,0.25);
}
.btn-theme:hover { background: rgba(255,255,255,0.28); }
.btn-print {
  background: #f59e0b; color: #1a1a2e;
}
.btn-print:hover { background: #fbbf24; }
.btn-expand {
  background: rgba(255,255,255,0.12);
  color: #c7d2fe; border: 1px solid rgba(255,255,255,0.2);
}
.btn-expand:hover { background: rgba(255,255,255,0.22); }

/* ── LEGEND BAR ─────────────────────────────────────────────── */
.legend-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  transition: background 0.3s, border-color 0.3s;
}
.legend-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; }
.legend-chip {
  font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px;
  cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s; white-space: nowrap;
}
.legend-chip:hover { transform: translateY(-1px); box-shadow: 0 3px 8px var(--shadow); }
.legend-chip.active { opacity: 1; }
.legend-chip.hidden-unit { opacity: 0.38; }

/* ── MAIN LAYOUT ────────────────────────────────────────────── */
.main-wrap { max-width: 1400px; margin: 0 auto; padding: 28px 20px 60px; }

/* ── UNIT SECTION ───────────────────────────────────────────── */
.unit-section {
  margin-bottom: 36px;
  border-radius: 14px; overflow: hidden;
  border: 1.5px solid var(--border);
  box-shadow: 0 2px 12px var(--shadow);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.unit-section.hidden { display: none; }

.unit-header {
  padding: 16px 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  user-select: none; transition: filter 0.2s;
}
.unit-header:hover { filter: brightness(1.06); }
.unit-header-left { display: flex; align-items: center; gap: 12px; }
.unit-badge {
  font-family: 'Playfair Display', serif;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.2); color: #fff;
}
.unit-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1.2;
}
.unit-count { font-size: 0.72rem; color: rgba(255,255,255,0.7); }
.chevron { font-size: 1rem; color: rgba(255,255,255,0.8); transition: transform 0.3s; }
.unit-section.collapsed .chevron { transform: rotate(-90deg); }

.unit-body { padding: 20px; background: var(--bg); transition: background 0.3s; }
.unit-section.collapsed .unit-body { display: none; }

/* ── CARDS GRID ─────────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ── TOPIC CARD ─────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: 12px;
  border: 1.5px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 1px 6px var(--shadow);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }

.card-header {
  padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 10px;
}
.card-emoji { font-size: 1.5rem; line-height: 1; flex-shrink: 0; margin-top: 1px; }
.card-title-wrap { flex: 1; }
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.97rem; font-weight: 600;
  line-height: 1.25; color: var(--text);
}
.card-preview { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }
.card-arrow { font-size: 0.8rem; color: var(--muted); transition: transform 0.25s; flex-shrink: 0; margin-top: 2px; }
.card.open .card-arrow { transform: rotate(180deg); }

.card-body {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
  animation: fadeIn 0.2s ease;
}
.card.open .card-body { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

.sub-group { margin-bottom: 12px; }
.sub-heading {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 5px; padding-bottom: 3px;
  border-bottom: 1px solid var(--border);
}
.card-body ul { list-style: none; padding: 0; }
.card-body li {
  font-size: 0.82rem; color: var(--text); line-height: 1.55;
  padding: 2px 0 2px 14px; position: relative;
}
.card-body li::before {
  content: "▸"; position: absolute; left: 0;
  font-size: 0.65rem; top: 4px;
}
.mnemonic-box {
  margin-top: 8px; padding: 8px 12px; border-radius: 8px;
  font-size: 0.78rem; font-style: italic; font-weight: 600;
  border-left: 3px solid;
}

        ]
      }
    ]
  }
];

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function buildBody(card, unitClass) {
  let html = '';
  card.body.forEach(block => {
    if (block.mnemonic) {
      html += `<div class="mnemonic-box">${block.mnemonic}</div>`;
    } else {
      html += `<div class="sub-group"><div class="sub-heading">${block.h}</div><ul>`;
      block.items.forEach(i => { html += `<li>${i}</li>`; });
      html += `</ul></div>`;
    }
  });
  return html;
}

function render() {
  const wrap = document.getElementById('mainWrap');
  const legend = document.getElementById('legendBar');

  UNITS.forEach((unit, ui) => {
    const uClass = unit.id;
    const colorVar = `--${uClass}`;

    // Legend chip
    const chip = document.createElement('span');
    chip.className = `legend-chip legend-chip-el ${uClass}`;
    chip.id = `chip-${uClass}`;
    chip.textContent = `Unit ${unit.num}`;
    chip.style.background = `var(${colorVar}-bg)`;
    chip.style.color = `var(${colorVar})`;
    chip.style.borderColor = `var(${colorVar}-border)`;
    chip.classList.add('active');
    chip.onclick = () => toggleUnit(uClass);
    legend.appendChild(chip);

    // Section
    const sec = document.createElement('section');
    sec.className = `unit-section ${uClass}`;
    sec.id = `sec-${uClass}`;

    const hdr = document.createElement('div');
    hdr.className = 'unit-header';
    hdr.innerHTML = `
      <div class="unit-header-left">
        <span class="unit-badge">Unit ${unit.num}</span>
        <span class="unit-title">${unit.title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="unit-count">${unit.cards.length} topic${unit.cards.length>1?'s':''}</span>
        <span class="chevron">▾</span>
      </div>`;
    hdr.onclick = () => sec.classList.toggle('collapsed');

    const body = document.createElement('div');
    body.className = 'unit-body';

    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    unit.cards.forEach((card, ci) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.innerHTML = `
        <div class="card-header">
          <span class="card-emoji">${card.emoji}</span>
          <div class="card-title-wrap">
            <div class="card-title">${card.title}</div>
            <div class="card-preview">${card.preview}</div>
          </div>
          <span class="card-arrow">▾</span>
        </div>
        <div class="card-body">${buildBody(card, uClass)}</div>`;
      cardEl.onclick = () => cardEl.classList.toggle('open');
      grid.appendChild(cardEl);
    });

    body.appendChild(grid);
    sec.appendChild(hdr);
    sec.appendChild(body);
    wrap.appendChild(sec);
  });
}

// ══════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════
function toggleUnit(uClass) {
  const sec = document.getElementById(`sec-${uClass}`);
  const chip = document.getElementById(`chip-${uClass}`);
  sec.classList.toggle('hidden');
  chip.classList.toggle('hidden-unit');
  chip.classList.toggle('active');
}

function toggleAll(expand) {
  document.querySelectorAll('.unit-section').forEach(s => {
    if (expand) s.classList.remove('collapsed');
    else s.classList.add('collapsed');
  });
  if (expand) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('open'));
  } else {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
  }
}

// ══════════════════════════════════════════════════════════════
// DARK / LIGHT MODE
// ══════════════════════════════════════════════════════════════
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '☀️ Light Mode' : '🌙 Dark Mode';
  localStorage.setItem('mb-theme', dark ? 'dark' : 'light');
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  setTheme(!isDark);
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
render();

const saved = localStorage.getItem('mb-theme');
if (saved) {
  setTheme(saved === 'dark');
} else {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  setTheme(prefersDark);
}
</script>
</body>
</html>
